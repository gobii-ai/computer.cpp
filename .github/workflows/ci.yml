name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    name: macOS Tests
    runs-on: macos-26
    env:
      BUILD_DIR: build/debug-ninja
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          brew install cmake ninja wxwidgets lua

      - name: Build and test
        run: |
          scripts/build.sh --verify --build-dir "$BUILD_DIR" --generator Ninja --no-code-sign
