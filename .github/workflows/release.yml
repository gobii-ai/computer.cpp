name: Release computer.cpp

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        options:
          - major
          - minor
          - patch
        default: minor
        required: true
      notes:
        description: Release notes
        type: string
        required: false
      title:
        description: Release title
        type: string
        required: false

concurrency:
  group: computer-cpp-release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  macos:
    name: macOS Release Artifact
    runs-on: macos-26
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}
    env:
      BUILD_DIR: build/release
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master

      - name: Install build dependencies
        run: |
          brew install cmake ninja wxwidgets dylibbundler lua

      - name: Bump version
        id: bump_version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          bump = os.environ["BUMP"]
          cmake_path = Path("CMakeLists.txt")
          cmake_text = cmake_path.read_text(encoding="utf-8")

          version_match = re.search(
              r"(?ms)^(project\(computer\.cpp\s+VERSION\s+)"
              r"(?P<version>\d+\.\d+\.\d+)"
              r"(\s+DESCRIPTION\s+)",
              cmake_text,
          )
          if not version_match:
              print("Version not found in CMakeLists.txt project(computer.cpp VERSION X.Y.Z)", file=sys.stderr)
              sys.exit(1)

          major, minor, patch = (int(part) for part in version_match.group("version").split("."))
          if bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          elif bump == "patch":
              patch += 1
          else:
              print(f"Unsupported bump: {bump}", file=sys.stderr)
              sys.exit(1)

          new_version = f"{major}.{minor}.{patch}"
          cmake_path.write_text(
              cmake_text[:version_match.start("version")]
              + new_version
              + cmake_text[version_match.end("version"):],
              encoding="utf-8",
          )
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8", newline="\n") as env:
              env.write(f"NEW_VERSION={new_version}\n")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8", newline="\n") as out:
              out.write(f"new_version={new_version}\n")
          print(f"Bumped version to {new_version}")
          PY

      - name: Validate signing secrets
        env:
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          python3 - <<'PY'
          import os
          import sys

          required = [
              "MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64",
              "MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD",
              "MACOS_KEYCHAIN_PASSWORD",
              "MACOS_NOTARY_KEY_BASE64",
              "MACOS_NOTARY_KEY_ID",
              "MACOS_NOTARY_ISSUER_ID",
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              print("Missing required macOS release secrets:", ", ".join(missing), file=sys.stderr)
              sys.exit(1)
          PY

      - name: Import signing certificate
        env:
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"

          printf '%s' "$MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "Developer ID Application signing identity was not found in imported certificate" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2
            exit 1
          fi

          {
            echo "SIGNING_IDENTITY=$SIGNING_IDENTITY"
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
          } >> "$GITHUB_ENV"

      - name: Build release targets
        run: |
          scripts/build-mac.sh --release --build-dir "$BUILD_DIR"

      - name: Prepare notary credentials
        env:
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${MACOS_NOTARY_KEY_ID}.p8"
          printf '%s' "$MACOS_NOTARY_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"

          {
            echo "NOTARY_KEY_PATH=$NOTARY_KEY_PATH"
            echo "MACOS_NOTARY_KEY_ID=$MACOS_NOTARY_KEY_ID"
            echo "MACOS_NOTARY_ISSUER_ID=$MACOS_NOTARY_ISSUER_ID"
          } >> "$GITHUB_ENV"

      - name: Sign, notarize, and package macOS asset
        run: |
          set -euo pipefail

          DIST_ROOT="dist"
          ASSET_BASENAME="computer.cpp-${NEW_VERSION}-macos-arm64"
          DIST_DIR="${DIST_ROOT}/${ASSET_BASENAME}"
          NOTARY_ZIP="${RUNNER_TEMP}/${ASSET_BASENAME}-notary.zip"

          rm -rf "$DIST_ROOT"
          mkdir -p "$DIST_DIR"
          cp "$BUILD_DIR/computer.cpp" "$DIST_DIR/computer.cpp"
          ditto "$BUILD_DIR/ComputerCpp.app" "$DIST_DIR/ComputerCpp.app"
          BUNDLED_LUA="$DIST_DIR/ComputerCpp.app/Contents/Resources/lua/bin/lua"
          if [[ ! -x "$BUNDLED_LUA" ]]; then
            echo "Bundled Lua executable is missing from ComputerCpp.app: $BUNDLED_LUA" >&2
            exit 1
          fi

          mkdir -p "$DIST_DIR/ComputerCpp.app/Contents/Frameworks"
          HOMEBREW_PREFIX="$(brew --prefix)"
          WX_PREFIX="$(brew --prefix wxwidgets)"
          LUA_PREFIX="$(brew --prefix lua)"
          dylibbundler \
            -od \
            -b \
            -x "$DIST_DIR/ComputerCpp.app/Contents/MacOS/ComputerCpp" \
            -d "$DIST_DIR/ComputerCpp.app/Contents/Frameworks" \
            -p "@executable_path/../Frameworks" \
            -s "$WX_PREFIX/lib" \
            -s "$HOMEBREW_PREFIX/lib"
          dylibbundler \
            -b \
            -x "$BUNDLED_LUA" \
            -d "$DIST_DIR/ComputerCpp.app/Contents/Frameworks" \
            -p "@executable_path/../../../Frameworks" \
            -s "$LUA_PREFIX/lib" \
            -s "$HOMEBREW_PREFIX/lib"

          if ! find "$DIST_DIR/ComputerCpp.app/Contents/Frameworks" -type f -name 'libwx_*.dylib' | grep -q .; then
            echo "Bundled wxWidgets dylibs are missing from ComputerCpp.app/Contents/Frameworks" >&2
            otool -L "$DIST_DIR/ComputerCpp.app/Contents/MacOS/ComputerCpp" >&2
            exit 1
          fi

          while IFS= read -r dependency; do
            dylib="${dependency#@executable_path/../Frameworks/}"
            dylib="${dylib#@executable_path/../../../Frameworks/}"
            if [[ ! -f "$DIST_DIR/ComputerCpp.app/Contents/Frameworks/$dylib" ]]; then
              echo "Bundled dependency is missing: $dylib" >&2
              exit 1
            fi
          done < <(
            {
              otool -L "$DIST_DIR/ComputerCpp.app/Contents/MacOS/ComputerCpp"
              otool -L "$BUNDLED_LUA"
              while IFS= read -r -d '' dylib; do
                otool -L "$dylib"
              done < <(find "$DIST_DIR/ComputerCpp.app/Contents/Frameworks" -type f -name '*.dylib' -print0)
            } | awk '/@executable_path\/.*\/Frameworks\// { print $1 }' | sort -u
          )

          {
            echo "$DIST_DIR/ComputerCpp.app/Contents/MacOS/ComputerCpp"
            echo "$DIST_DIR/ComputerCpp.app/Contents/MacOS/computer.cpp"
            echo "$DIST_DIR/computer.cpp"
            echo "$BUNDLED_LUA"
            find "$DIST_DIR/ComputerCpp.app/Contents/Frameworks" -type f -name '*.dylib'
          } | while IFS= read -r binary; do
            if otool -L "$binary" | grep -Eq '/opt/homebrew|/usr/local'; then
              echo "$binary still references Homebrew dylibs after bundling" >&2
              otool -L "$binary" >&2
              exit 1
            fi
          done

          find "$DIST_DIR/ComputerCpp.app/Contents/Frameworks" -type f -name '*.dylib' -print0 |
            while IFS= read -r -d '' dylib; do
              codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$dylib"
            done
          codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$BUNDLED_LUA"
          codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$DIST_DIR/ComputerCpp.app/Contents/MacOS/computer.cpp"
          codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$DIST_DIR/computer.cpp"
          codesign --force --deep --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$DIST_DIR/ComputerCpp.app"

          codesign --verify --deep --strict --verbose=4 "$DIST_DIR/ComputerCpp.app"
          codesign --verify --strict --verbose=4 "$DIST_DIR/computer.cpp"

          (cd "$DIST_ROOT" && ditto -c -k --sequesterRsrc --keepParent "$ASSET_BASENAME" "$NOTARY_ZIP")
          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --wait

          xcrun stapler staple "$DIST_DIR/ComputerCpp.app"
          xcrun stapler validate "$DIST_DIR/ComputerCpp.app"
          spctl --assess --type execute --verbose=4 "$DIST_DIR/ComputerCpp.app"

          (cd "$DIST_ROOT" && ditto -c -k --sequesterRsrc --keepParent "$ASSET_BASENAME" "${ASSET_BASENAME}.zip")

      - name: Commit version bump
        run: |
          NEW_VERSION="$(printf '%s' "$NEW_VERSION" | tr -d '\r\n')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt
          git commit -m "chore(release): ${NEW_VERSION}"
          git tag -a "${NEW_VERSION}" -m "Release ${NEW_VERSION}"

      - name: Push release commit and tag
        run: |
          git push origin HEAD:master
          git push origin --tags

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: dist/computer.cpp-${{ steps.bump_version.outputs.new_version }}-macos-arm64.zip
          if-no-files-found: error

  windows:
    name: Windows Release Artifacts
    runs-on: windows-2025
    needs: macos
    env:
      BUILD_DIR: build/windows-release
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: clear;nuget,GitHub,readwrite
      NEW_VERSION: ${{ needs.macos.outputs.new_version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.macos.outputs.new_version }}

      - name: Verify build dependencies
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
          }
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue) -or -not (Get-Command light.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset -y
          }
          ninja --version
          (Get-Command candle.exe).Source
          (Get-Command light.exe).Source

      - name: Configure MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure vcpkg binary cache
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $vcpkg = Join-Path $env:VCPKG_INSTALLATION_ROOT "vcpkg.exe"
          if (-not (Test-Path $vcpkg)) {
            $vcpkg = "vcpkg"
          }
          $nuget = (& $vcpkg fetch nuget | Select-Object -Last 1).Trim()
          $source = "https://nuget.pkg.github.com/$env:GITHUB_REPOSITORY_OWNER/index.json"
          & $nuget sources Remove -Name GitHub -NonInteractive 2>$null
          & $nuget sources Add `
            -Name GitHub `
            -Source $source `
            -UserName $env:GITHUB_REPOSITORY_OWNER `
            -Password $env:GITHUB_TOKEN `
            -StorePasswordInClearText `
            -NonInteractive
          & $nuget setapikey $env:GITHUB_TOKEN -Source GitHub -NonInteractive

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          $vcpkg = Join-Path $env:VCPKG_INSTALLATION_ROOT "vcpkg.exe"
          if (-not (Test-Path $vcpkg)) {
            $vcpkg = "vcpkg"
          }
          $installedDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE $env:BUILD_DIR) "vcpkg_installed"
          & $vcpkg install `
            --triplet "$env:VCPKG_DEFAULT_TRIPLET" `
            --x-manifest-root="$env:GITHUB_WORKSPACE" `
            --x-install-root="$installedDir" `
            --x-feature=gui `
            --x-feature=bundled-lua

      - name: Configure
        shell: pwsh
        run: |
          $installedDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE $env:BUILD_DIR) "vcpkg_installed"
          cmake -S . -B "$env:BUILD_DIR" -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTING=OFF `
            -DCOMPUTER_CPP_BUILD_GUI=ON `
            "-DVCPKG_MANIFEST_FEATURES=gui;bundled-lua" `
            -DVCPKG_MANIFEST_INSTALL=OFF `
            -DVCPKG_INSTALLED_DIR="$installedDir" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build and package
        shell: pwsh
        run: |
          cmake --build "$env:BUILD_DIR" --target all --config Release
          cpack --config "$env:BUILD_DIR/CPackConfig.cmake" -B dist

      - name: Sign Windows artifacts when configured
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_SIGNING_CERTIFICATE_BASE64) {
            "Windows signing certificate not configured; leaving artifacts unsigned."
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "computer-cpp-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERTIFICATE_BASE64))
          $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) {
            throw "signtool.exe not found"
          }
          Get-ChildItem dist -Recurse -Include *.exe,*.dll,*.msi | ForEach-Object {
            & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $certPath /p "$env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD" $_.FullName
          }

      - name: Smoke packaged portable zip
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist -Filter "computer.cpp-$env:NEW_VERSION-windows-x64.zip" | Select-Object -First 1
          if (-not $zip) { throw "portable zip not found" }
          $extract = Join-Path $env:RUNNER_TEMP "computer-cpp-portable"
          Expand-Archive $zip.FullName -DestinationPath $extract
          $cli = Get-ChildItem $extract -Recurse -Filter computer.cpp.exe | Select-Object -First 1
          if (-not $cli) { throw "computer.cpp.exe not found in portable zip" }
          & $cli.FullName run --dry-run tests/lua/dry-run.lua
          & $cli.FullName open
          & $cli.FullName ping
          & $cli.FullName close

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            dist/computer.cpp-${{ needs.macos.outputs.new_version }}-windows-x64.zip
            dist/computer.cpp-${{ needs.macos.outputs.new_version }}-windows-x64.msi
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
    env:
      NEW_VERSION: ${{ needs.macos.outputs.new_version }}
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release-assets
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: artifacts/windows

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${NEW_VERSION}" \
            --jq .body > release-notes-auto.md

      - name: Assemble release notes file
        env:
          NOTES: ${{ inputs.notes }}
          TITLE: ${{ inputs.title }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          version = os.environ.get("NEW_VERSION", "").strip()
          title = os.environ.get("TITLE", "").strip()
          notes = os.environ.get("NOTES", "").strip()

          parts = []
          if version:
              parts.append(f"## {version}" + (f" - {title}" if title else ""))
          if notes:
              parts.extend(["", notes])

          auto_path = Path("release-notes-auto.md")
          if auto_path.exists():
              auto_notes = auto_path.read_text(encoding="utf-8").strip()
              if auto_notes:
                  parts.extend(["", auto_notes])

          content = "\n".join(parts).lstrip()
          if content and not content.endswith("\n"):
              content += "\n"
          Path("release-notes.md").write_text(content, encoding="utf-8")
          PY

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ inputs.title }}
        run: |
          RELEASE_TITLE="$(printf '%s' "$TITLE" | tr -d '\r\n')"
          if [ -z "$RELEASE_TITLE" ]; then
            RELEASE_TITLE="$NEW_VERSION"
          fi

          gh release create "${NEW_VERSION}" \
            "artifacts/macos/computer.cpp-${NEW_VERSION}-macos-arm64.zip#computer.cpp-${NEW_VERSION}-macos-arm64.zip" \
            "artifacts/windows/computer.cpp-${NEW_VERSION}-windows-x64.zip#computer.cpp-${NEW_VERSION}-windows-x64.zip" \
            "artifacts/windows/computer.cpp-${NEW_VERSION}-windows-x64.msi#computer.cpp-${NEW_VERSION}-windows-x64.msi" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$RELEASE_TITLE" \
            --notes-file release-notes.md
